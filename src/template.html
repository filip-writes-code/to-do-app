<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo">
                <h2>TaskMaster</h2>
            </div>
            <div class="menu-section">
                <h3>Sort By</h3>
                <p>Today</p>
                <p>This Week</p>
                <p>This Month</p>
            </div>
            <div class="projects menu-section">
                <h3>My Projects</h3>
                <p>All Projects</p>
                <p>My Tasks</p>
            </div>
        </div>
        <div class="content">
            <div class="task-wrapper">
                <div class="tasks-header task">
                    <div class="completed"></div>
                    <div class="title">Title</div>
                    <div class="due-date">Due Date</div>
                    <div class="priority">Priority</div>
                    <div class="actions"></div>
                </div>
            </div>
            <div class="task-wrapper">
                <div class="task">
                    <input type="checkbox">
                    <div class="title">Welcome to Taskmaster</div>
                    <div class="due-date">04/10/2026</div>
                    <div class="priority">Medium</div>
                    <div class="actions">
                        <button>Edit</button>
                        <button>Delete</button>
                    </div>
                </div>
                <!-- <div class="description">This is an example task.</div> -->
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster</title>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo">
                <h2>TaskMaster</h2>
            </div>
            <div class="menu-section">
                <h3>Sort By</h3>
                <p>Today</p>
                <p>This Week</p>
                <p>This Month</p>
            </div>
            <div class="projects menu-section">
                <h3>My Projects</h3>
                <p>All Projects</p>
                <div class="projects-content"></div>
            </div>
            <div class="add-project menu-section">
                <form>    
                <input type="text" id="add-project-title" placeholder="Project Name" required>
                    <button id="add-project-btn">Add Project</button>
                </form>
            </div>
        </div>
        <div class="content-wrapper">
            <div class="task-wrapper">
                <div class="tasks-header task">
                    <div class="completed"></div>
                    <div class="title">Title</div>
                    <div class="due-date">Due Date</div>
                    <div class="priority">Priority</div>
                    <div class="actions"></div>
                </div>
            </div>
            <div class="content"></div>
            <div class="add-task-section">
                <div class="label-group">
                    <label for="add-task">Add Task: </label>
                    <input type="text" id="add-task">
                </div>
                <div class="label-group">
                    <label for="add-date">Due Date: </label>
                    <input type="date" id="add-date">
                </div>
                <div class="label-group">
                    <label for="add-priority">Priority: </label>
                    <select name="add-priority" id="add-priority">
                        <option value="0">Low</option>
                        <option value="1">Medium</option>
                        <option value="2">High</option>
                    </select>
                </div>
                <button id="add-task-btn">Add Task</button>
            </div>
        </div>
    </div>
</body>
</html>
